<app-checklist-header (modeChange)="setMode($event)" (helpClick)="openTutorial()" />

<div
  class="checklist-body"
  [class.checklist-body--enter]="modeSlidePhase() === 'enter'"
  [class.checklist-body--to-next]="modeSlideDirection() === 'to-next'"
  [class.checklist-body--to-prev]="modeSlideDirection() === 'to-prev'"
>
  @if (layout.isMobile()) {
    <app-checklist-mobile />
  } @else {
    <app-checklist-desktop />
  }
</div>

<app-tutorial-dialog />
