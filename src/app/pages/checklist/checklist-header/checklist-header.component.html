<header class="checklist-header">
  @if (layout.isMobile()) {
    <div class="segmented-control" role="tablist" aria-label="Checklist mode">
      <span
        class="segmented-control__thumb"
        [class.segmented-control__thumb--tainted]="store.mode() === 'tainted'"
        [class.segmented-control__thumb--challenges]="store.mode() === 'challenges'"
        aria-hidden="true"
      ></span>
      <button
        type="button"
        class="segment"
        role="tab"
        [class.active]="store.mode() === 'regular'"
        [attr.aria-selected]="store.mode() === 'regular'"
        (click)="modeChange.emit('regular')"
      >
        Regular
      </button>
      <button
        type="button"
        class="segment"
        role="tab"
        [class.active]="store.mode() === 'tainted'"
        [attr.aria-selected]="store.mode() === 'tainted'"
        (click)="modeChange.emit('tainted')"
      >
        Tainted
      </button>
      <button
        type="button"
        class="segment"
        role="tab"
        [class.active]="store.mode() === 'challenges'"
        [attr.aria-selected]="store.mode() === 'challenges'"
        (click)="modeChange.emit('challenges')"
      >
        Challenges
      </button>
    </div>
  } @else {
    <div class="tabs">
      <button class="tab" [class.active]="store.mode() === 'regular'" (click)="modeChange.emit('regular')">
        Regular Characters
      </button>
      <button class="tab" [class.active]="store.mode() === 'tainted'" (click)="modeChange.emit('tainted')">
        Tainted Characters
      </button>
      <button
        class="tab"
        [class.active]="store.mode() === 'challenges'"
        (click)="modeChange.emit('challenges')"
      >
        Challenges
      </button>
    </div>
  }

  <div class="progress-row">
    <div class="progress">
      <div class="progress__bar" [style.width.%]="store.achievedPercent()"></div>
    </div>
    <span class="progress__label">{{ progressLabel() }}</span>
    <button
      type="button"
      class="steam-button"
      [class.steam-button--with-icon]="steamAuth.connected()"
      [disabled]="steamAuth.status() === 'loading'"
      [attr.aria-busy]="steamAuth.status() === 'loading'"
      (click)="onSteamClick()"
    >
      @if (steamAuth.connected()) {
        <span class="material-symbols-outlined" aria-hidden="true">sync</span>
      }
      {{ steamButtonLabel() }}
    </button>
    @if (steamAuth.connected()) {
      <button
        type="button"
        class="steam-button steam-button--logout"
        [disabled]="steamAuth.status() === 'loading'"
        aria-label="Logout from Steam"
        (click)="onLogoutClick()"
      >
        <span class="material-symbols-outlined" aria-hidden="true">logout</span>
      </button>
    }
    <button
      type="button"
      class="help-button"
      (click)="helpClick.emit()"
      aria-label="Open tutorial"
      aria-haspopup="dialog"
    >
      <span class="material-symbols-outlined" aria-hidden="true">help</span>
    </button>
  </div>
</header>

@if (steamAuth.toast(); as toast) {
  <output
    class="steam-toast"
    [class.steam-toast--error]="toast.kind === 'error'"
    aria-live="polite"
  >
    {{ toast.message }}
  </output>
}
